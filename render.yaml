services:
  # ─── Backend (NestJS) ───────────────────────────────────────────────────────
  - type: web
    name: codshield-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these sensitive values in the Render dashboard:
      # DATABASE_URL, DIRECT_URL, SESSION_SECRET, JWT_SECRET, REFRESH_SECRET
      # TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_PHONE_NUMBER
      # SMTP_HOST, SMTP_PORT, SMTP_SECURE, SMTP_USER, SMTP_PASS
      - key: FRONTEND_URL
        value: https://codshield-frontend.onrender.com
      - key: CODSHIELD_DEMO_MODE
        value: false
      - key: TWOFACTOR_API_KEY
        value: 401ff8db-7aaf-11f1-803e-0200cd936042
      - key: DEV_OTP_BYPASS
        value: "123456"
      - key: BOOKING_EMAIL
        value: info@veritonaitechnologies.com
      - key: BOOKING_EMAIL_FROM
        value: "CODShield <info@veritonaitechnologies.com>"
    healthCheckPath: /health

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  - type: web
    name: codshield-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://codshield-backend.onrender.com
      - key: BACKEND_URL
        value: https://codshield-backend.onrender.com
      # Set this sensitive value in the Render dashboard:
      # SESSION_SECRET
