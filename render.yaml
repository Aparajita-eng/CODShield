services:
  # ─── Backend (NestJS) ───────────────────────────────────────────────────────
  - type: web
    name: codshield-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these in the Render dashboard (sensitive values):
      # DATABASE_URL, JWT_SECRET, REFRESH_SECRET, SESSION_SECRET,
      # TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_PHONE_NUMBER,
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        value: info@veritonaitechnologies.com
      - key: SMTP_PASS
        value: SpokenPro1@123
      - key: BOOKING_EMAIL
        value: info@veritonaitechnologies.com
      - key: BOOKING_EMAIL_FROM
        value: "CODShield <info@veritonaitechnologies.com>"

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  - type: web
    name: codshield-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://codshield-backend.onrender.com
      - key: SESSION_SECRET
        value: 81e9d25d967e6e542f359925d20025b07cbec07aab2cccf2d6643448080fe6e10387515a420d4a48ce8e015beef9b6a3a52e1f32c3d61230f76aa910c35aef57
