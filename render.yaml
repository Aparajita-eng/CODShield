# CODShield — Render Blueprint
# Deploy: Render Dashboard → New → Blueprint → connect this repo
# Docs: docs/DEPLOY_RENDER.md

databases:
  - name: codshield-db
    plan: free
    databaseName: codshield
    user: codshield

services:
  # ── Backend API (Express + Prisma) ──────────────────────────────────────
  - type: web
    name: codshield-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: codshield-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: codshield-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: codshield-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DEMO_USER_EMAIL
        value: demo@codshield.com
      - key: DEMO_USER_PASSWORD
        value: Demo@1234

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: codshield-web
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: codshield-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: SESSION_SECRET
        fromService:
          type: web
          name: codshield-api
          envVarKey: SESSION_SECRET
